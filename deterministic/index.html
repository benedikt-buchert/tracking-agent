<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Deterministic Fixture: Landing</title>
        <style>
            body {
                font-family: sans-serif;
                margin: 0;
                padding: 2rem;
                background: #f5f1e8;
                color: #1f1c16;
            }
            main {
                max-width: 54rem;
                margin: 0 auto;
                display: grid;
                gap: 1rem;
            }
            section {
                background: #fffdf8;
                border: 1px solid #d8cfbf;
                border-radius: 1rem;
                padding: 1rem;
            }
            a {
                display: inline-block;
                padding: 0.9rem 1rem;
                border-radius: 0.75rem;
                background: #1f5b4f;
                color: white;
                text-decoration: none;
            }
            pre {
                background: #1c1b19;
                color: #f5f1e8;
                padding: 1rem;
                border-radius: 0.75rem;
                min-height: 8rem;
                overflow: auto;
            }
        </style>
    </head>
    <body data-data-layer-mode="rehydrate">
        <main>
            <section>
                <h1>Deterministic Fixture</h1>
                <p>
                    Stable selectors, stable layout, and a predictable checkout
                    journey with redirect hops and delayed page readiness.
                </p>
                <a
                    data-testid="start-checkout"
                    href="/deterministic/transit.html?next=%2Fdeterministic%2Fcheckout.html&label=checkout"
                >
                    Start checkout
                </a>
            </section>

            <section>
                <h2>Persisted dataLayer state</h2>
                <pre id="events-view">[]</pre>
            </section>
        </main>

        <script src="/shared/fixture-store.js"></script>
        <script>
            window.fixtureStore.bootPage({
                viewSelector: "#events-view",
                reset: true,
            });
        </script>
    </body>
</html>
