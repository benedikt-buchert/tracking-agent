name: Mutation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mutation-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: mutation-pr-${{ github.base_ref }}-${{ hashFiles('package-lock.json', 'stryker.config.json') }}
          restore-keys: |
            mutation-pr-${{ github.base_ref }}-
            mutation-main-

      - run: npm ci
      - run: node --import tsx src/quality/mutation-run.ts --base origin/${{ github.base_ref }} --head HEAD

  mutation-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: mutation-main-${{ github.ref_name }}-${{ hashFiles('package-lock.json', 'stryker.config.json') }}
          restore-keys: |
            mutation-main-${{ github.ref_name }}-
            mutation-main-

      - run: npm ci
      - run: npm run test:mutation
