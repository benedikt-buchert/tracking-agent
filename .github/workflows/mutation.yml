name: Mutation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mutation-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: node --import tsx src/mutation-run.ts --base origin/${{ github.base_ref }} --head HEAD

  mutation-main:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test:mutation -- --coverageAnalysis off --concurrency 1
