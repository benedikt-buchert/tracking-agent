<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ephemeral Fixture: Transit</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 2rem;
        background: #f1f4e8;
        color: #202218;
      }
      main {
        max-width: 54rem;
        margin: 0 auto;
        display: grid;
        gap: 1rem;
      }
      section {
        background: #fbfcf7;
        border: 1px solid #cad0bb;
        border-radius: 1rem;
        padding: 1rem;
      }
      pre {
        background: #1c1f19;
        color: #eef5e1;
        padding: 1rem;
        border-radius: 0.75rem;
        min-height: 8rem;
        overflow: auto;
      }
    </style>
  </head>
  <body data-data-layer-mode="ephemeral">
    <main>
      <section>
        <h1>Redirecting to checkout</h1>
        <p id="transit-status">Preparing the next page...</p>
      </section>

      <section>
        <h2>Current page dataLayer</h2>
        <pre id="events-view">[]</pre>
      </section>
    </main>

    <script src="/shared/fixture-store.js"></script>
    <script>
      const store = window.fixtureStore;
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next") || "/ephemeral/";
      const label = params.get("label") || "next step";

      document.getElementById("transit-status").textContent =
        `Redirecting to ${label}...`;
      store.bootPage({ viewSelector: "#events-view" });

      setTimeout(() => {
        window.location.href = next;
      }, 350);
    </script>
  </body>
</html>
